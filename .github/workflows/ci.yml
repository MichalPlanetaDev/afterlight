name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  VCPKG_DISABLE_METRICS: 1

jobs:
  linux:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux Clang
            preset: linux-clang-debug
          - name: Linux GCC
            preset: linux-gcc-debug
          - name: Linux Sanitizers
            preset: linux-clang-sanitize
          - name: Linux Static Analysis
            preset: linux-clang-analysis

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: ./scripts/install-linux-prerequisites.sh

      - name: Validate
        run: |
          rm -rf "build/${{ matrix.preset }}"
          ./scripts/validate.sh "${{ matrix.preset }}"

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: logs-${{ matrix.preset }}
          path: out/logs
          retention-days: 7
          if-no-files-found: ignore

  windows:
    name: Windows MSVC
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Bootstrap vcpkg
        shell: pwsh
        run: ./scripts/bootstrap-vcpkg.ps1

      - name: Configure
        run: cmake --preset windows-msvc-debug

      - name: Build
        run: cmake --build --preset windows-msvc-debug

      - name: Test
        run: ctest --preset windows-msvc-debug
